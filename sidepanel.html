<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selection QA Side Panel</title>
    <link rel="stylesheet" href="node_modules/katex/dist/katex.min.css" />
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="sp-page">
      <header class="sp-header">
        <div>
          <h1>浏览器侧栏问答</h1>
          <p>结合当前选中文本进行多轮对话</p>
        </div>
        <div class="sp-header-actions">
          <button type="button" id="sp-refresh">刷新</button>
          <button type="button" id="sp-clear">清空会话</button>
        </div>
      </header>

      <section class="sp-chat" id="sp-chat"></section>
      <div class="sp-status" id="sp-status"></div>

      <section class="sp-composer">
        <label for="sp-input">继续对话</label>
        <textarea id="sp-input" rows="4" placeholder="结合当前选中文本继续提问，留空时默认回答上面问题"></textarea>
        <div class="sp-actions">
          <button type="button" id="sp-send">发送</button>
        </div>
      </section>
    </main>

    <script src="node_modules/katex/dist/katex.min.js"></script>
    <script src="sidepanel.js"></script>
  </body>
  </html>
